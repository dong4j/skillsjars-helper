# SkillsJars Helper landing site — nginx 站点配置
#
# 用法:
#   1. ./deploy.sh -n           # 通过 deploy.sh 自动上传 + 远程 reload
#   2. 或手工: scp landing/nginx.conf <host>:/etc/nginx/conf.d/skillsjars-helper.conf
#              ssh <host> "nginx -t && systemctl reload nginx"
#
# 维护提示:
#   - 把 server_name 改成你的真实域名
#   - 把 root 改成 deploy.sh 里 REMOTE_ROOT_DIR 的同值 (默认 /var/www/skillsjars-helper)
#   - HTTPS 推荐用 certbot 自动管理: sudo certbot --nginx -d <domain>
#     certbot 会在本配置上原地补一段 listen 443 ssl + ssl_certificate 段, 无需手改

server {
    listen 80;
    listen [::]:80;
    server_name skillsjars-helper.example.com;   # 改成你的真实域名

    root /var/www/skillsjars-helper;             # 必须与 deploy.sh 里 REMOTE_ROOT_DIR 一致
    index index.html;

    # ---------------------------------------------------------------
    # 静态资源缓存 1 天 (字体 / CSS / JS / PNG / SVG)
    # immutable: 浏览器在 max-age 内不会再发条件请求, 极大降低 RTT
    # ---------------------------------------------------------------
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------------
    # HTML 不缓存 (改文案后立刻生效)
    # 英文 / 中文两个 index.html 都走这条
    # ---------------------------------------------------------------
    location ~ \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---------------------------------------------------------------
    # 双语路由
    #   /     -> /index.html   (英文)
    #   /zh   -> /zh/index.html
    #   /zh/  -> /zh/index.html
    # 静态文件优先, 找不到再 fallback 到 index.html
    # ---------------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # ---------------------------------------------------------------
    # gzip — 文本类资源压缩, 二进制类 (woff2 / png) 已自带压缩, 跳过
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;
}
